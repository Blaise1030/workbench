          - generic [ref=e3626]:
            - img [ref=e3628]
            - paragraph [ref=e3632]: Virtualization is in beta and subject to change. It is opt-in and best used when rendering very large files or many diffs in one scroll view.
          - paragraph [ref=e3633]: Virtualization in Diffs uses estimated line and file heights to keep large renders fast. It renders placeholders and spacer buffers for off-screen content, then renders visible lines in hunk-sized batches as you scroll.
          - paragraph [ref=e3634]: Internally, the virtualizer listens to scroll and resize updates, computes a window with overscan, and reconciles measured DOM heights after render. This keeps scroll position stable even when line heights change because of wrapped lines or annotations.
          - paragraph [ref=e3635]:
            - text: For best results, you'll need to pass a
            - code [ref=e3636]: metrics
            - text: config object to your files or diffs when your layout differs from the defaults. These metrics help the Virtualizer estimate file and diff sizes more accurately before content is measured. For large diffs, using virtualization with a
            - link "Worker Pool" [ref=e3637] [cursor=pointer]:
              - /url: "#worker-pool"
            - text: is strongly recommended.
          - heading "Getting Started Link to this section" [level=3] [ref=e3638]:
            - text: Getting Started
            - link "Link to this section" [ref=e3639] [cursor=pointer]:
              - /url: "#virtualization-getting-started"
              - img [ref=e3640]
          - paragraph [ref=e3642]: To use virtualization, start with a scrollable container (an HTML element or the window). Directly inside that container, add a content wrapper that holds all diff/file instances and any other content you render. The virtualizer uses this wrapper to track content size changes.
          - paragraph [ref=e3643]:
            - text: Inside that scroll container, render the
            - code [ref=e3644]: VirtualizedFile
            - text: and
            - code [ref=e3645]: VirtualizedFileDiff
            - text: components. In React, this is handled automatically by the built-in
            - code [ref=e3646]: Virtualizer
            - text: context. In vanilla JS, you manage this explicitly by creating a
            - code [ref=e3647]: Virtualizer
            - text: instance and wiring it to
            - code [ref=e3648]: VirtualizedFile
            - text: /
            - code [ref=e3649]: VirtualizedFileDiff
            - text: instead of the traditional APIs.
          - generic [ref=e3650]:
            - img [ref=e3652]
