            - paragraph [ref=e7510]: This is an experimental feature being validated in production use cases. The API is subject to change.
          - paragraph [ref=e7511]:
            - text: The worker pool can cache rendered AST results to avoid redundant highlighting work. When a file or diff has a
            - code [ref=e7512]: cacheKey
            - text: ", subsequent requests with the same key will return cached results immediately instead of reprocessing through a worker. This works automatically for both React and Vanilla JS APIs."
          - generic [ref=e7513]:
            - img [ref=e7515]
            - paragraph [ref=e7518]:
              - text: Caching is enabled per-file/diff by setting a
              - code [ref=e7519]: cacheKey
              - text: property. Files and diffs without a
              - code [ref=e7520]: cacheKey
              - text: will not be cached. The cache also validates against render options — if options like theme or line diff type change, the cached result is skipped and re-rendered.
