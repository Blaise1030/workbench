          - paragraph [ref=e137]:
            - text: "We have an opinionated stance in our architecture:"
            - strong [ref=e138]: browsers are rather efficient at rendering raw HTML
            - text: . We lean into this by having all the lower level APIs purely rendering strings (the raw HTML) that are then consumed by higher-order components and utilities. This gives us great performance and flexibility to support popular libraries like React as well as provide great tools if you want to stick to vanilla JavaScript and HTML. The higher-order components render all this out into Shadow DOM and CSS grid layout.
          - paragraph [ref=e139]: Generally speaking, you're probably going to want to use the higher level components since they provide an easy-to-use API that you can get started with rather quickly. We currently only have components for vanilla JavaScript and React, but will add more if there's demand.
          - paragraph [ref=e140]: For this overview, we'll talk about the vanilla JavaScript components for now but there are React equivalents for all of these.
