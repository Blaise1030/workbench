              - generic [ref=e1765]: // ============================================================
              - generic [ref=e1766]: // SHARED OPTIONS FOR DIFF COMPONENTS
              - generic [ref=e1767]: // ============================================================
              - generic [ref=e1768]: // These options are shared by MultiFileDiff, PatchDiff, and FileDiff.
              - generic [ref=e1769]: "// Pass them via the `options` prop."
              - generic [ref=e1771]: "import type {"
              - generic [ref=e1772]: DiffTokenEventBaseProps,
              - generic [ref=e1773]: FileDiff as FileDiffClass,
              - generic [ref=e1774]: "} from '@pierre/diffs';"
              - generic [ref=e1775]: "import { MultiFileDiff } from '@pierre/diffs/react';"
              - generic [ref=e1777]: <MultiFileDiff
              - generic [ref=e1778]: "{...}"
              - generic [ref=e1779]: "options={{"
              - generic [ref=e1780]: "theme: { dark: 'pierre-dark', light: 'pierre-light' },"
              - generic [ref=e1781]: "diffStyle: 'split',"
              - generic [ref=e1782]: // ... see below for all available options
              - generic [ref=e1783]: "}}"
              - generic [ref=e1784]: />
              - generic [ref=e1786]: "interface DiffOptions {"
              - generic [ref=e1787]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1788]: // THEMING
              - generic [ref=e1789]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1791]: // Theme for syntax highlighting. Can be a single theme name or an
              - generic [ref=e1792]: // object with 'dark' and 'light' keys for automatic switching.
              - generic [ref=e1793]: "// Built-in options: 'pierre-dark', 'pierre-light', or any Shiki theme."
              - generic [ref=e1794]: "// See: https://shiki.style/themes"
              - generic [ref=e1795]: "theme: { dark: 'pierre-dark', light: 'pierre-light' },"
              - generic [ref=e1797]: "// When using dark/light theme object, this controls which is used:"
              - generic [ref=e1798]: // 'system' (default) - follows OS preference
              - generic [ref=e1799]: // 'dark' or 'light' - forces specific theme
              - generic [ref=e1800]: "themeType: 'system',"
              - generic [ref=e1802]: "// Choose the Shiki engine:"
              - generic [ref=e1803]: // 'shiki-js' (default) - JavaScript regex engine
              - generic [ref=e1804]: // 'shiki-wasm' - WASM Oniguruma engine
              - generic [ref=e1805]: "preferredHighlighter: 'shiki-js',"
              - generic [ref=e1807]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1808]: // DIFF DISPLAY
              - generic [ref=e1809]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1811]: // 'split' (default) - side-by-side view
              - generic [ref=e1812]: // 'unified' - single column view
              - generic [ref=e1813]: "diffStyle: 'split',"
              - generic [ref=e1815]: "// Line change indicators:"
              - generic [ref=e1816]: // 'bars' (default) - colored bars on left edge
              - generic [ref=e1817]: // 'classic' - '+' and '-' characters
              - generic [ref=e1818]: // 'none' - no indicators
              - generic [ref=e1819]: "diffIndicators: 'bars',"
              - generic [ref=e1821]: "// Show colored backgrounds on changed lines (default: false)"
              - generic [ref=e1822]: "disableBackground: false,"
              - generic [ref=e1824]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1825]: // HUNK SEPARATORS
              - generic [ref=e1826]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1828]: "// What to show between diff hunks:"
              - generic [ref=e1829]: // 'line-info' (default) - shows collapsed line count, clickable to expand
              - generic [ref=e1830]: "// WebKit/Safari bug in version 26 as of this writing: if you use"
              - generic [ref=e1831]: "// custom renderGutterUtility with hunkSeparators: 'line-info', you may"
              - generic [ref=e1832]: // experience scroll jumping while moving the mouse.
              - generic [ref=e1833]: "// Recommended: avoid this API by just using enableGutterUtility to render"
              - generic [ref=e1834]: // the default button, or switch to another hunk separator type
              - generic [ref=e1835]: // (e.g. 'line-info-basic').
              - generic [ref=e1836]: "// For a status of this bug, visit:"
              - generic [ref=e1837]: // https://bugs.webkit.org/show_bug.cgi?id=308027
              - generic [ref=e1838]: // 'line-info-basic' - slightly more compact full width line-info variant
              - generic [ref=e1839]: // 'metadata' - shows patch format like '@@ -60,6 +60,22 @@'
              - generic [ref=e1840]: // 'simple' - subtle bar separator
              - generic [ref=e1841]: // We recommend sticking to these built-in string presets in React.
              - generic [ref=e1842]: // The low-level functional separator API is only documented for vanilla JS,
              - generic [ref=e1843]: // is being phased out, and is a poor fit for the container-managed and
              - generic [ref=e1844]: // virtualization-oriented React APIs.
              - generic [ref=e1845]: "hunkSeparators: 'line-info',"
              - generic [ref=e1847]: "// Force unchanged context to always render (default: false)"
              - generic [ref=e1848]: // Requires oldFile/newFile API or FileDiffMetadata with newLines
              - generic [ref=e1849]: "expandUnchanged: false,"
              - generic [ref=e1851]: // Lines revealed per click when expanding collapsed regions
              - generic [ref=e1852]: "expansionLineCount: 100,"
              - generic [ref=e1854]: // Auto-expand collapsed context regions at or below this size
              - generic [ref=e1855]: "// (default: 1)"
              - generic [ref=e1856]: "collapsedContextThreshold: 1,"
              - generic [ref=e1858]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1859]: // INLINE CHANGE HIGHLIGHTING
              - generic [ref=e1860]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1862]: "// Highlight changed portions within modified lines:"
              - generic [ref=e1863]: // 'word-alt' (default) - word boundaries, minimizes single-char gaps
              - generic [ref=e1864]: // 'word' - word boundaries
              - generic [ref=e1865]: // 'char' - character-level granularity
              - generic [ref=e1866]: // 'none' - disable inline highlighting
              - generic [ref=e1867]: "lineDiffType: 'word-alt',"
              - generic [ref=e1869]: // Skip inline diff for lines exceeding this length
              - generic [ref=e1870]: "maxLineDiffLength: 1000,"
              - generic [ref=e1872]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1873]: // LAYOUT & DISPLAY
              - generic [ref=e1874]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1876]: "// Show line numbers (default: true)"
              - generic [ref=e1877]: "disableLineNumbers: false,"
              - generic [ref=e1879]: "// Long line handling: 'scroll' (default) or 'wrap'"
              - generic [ref=e1880]: "overflow: 'scroll',"
              - generic [ref=e1882]: // Hide the file header with filename and stats
              - generic [ref=e1883]: "disableFileHeader: false,"
              - generic [ref=e1885]: // Rethrow rendering errors instead of catching and displaying them
              - generic [ref=e1886]: // in the DOM. Useful for testing or custom error handling.
              - generic [ref=e1887]: "// (default: false)"
              - generic [ref=e1888]: "disableErrorHandling: false,"
              - generic [ref=e1890]: // Skip syntax highlighting for lines exceeding this length
              - generic [ref=e1891]: "tokenizeMaxLineLength: 1000,"
              - generic [ref=e1893]: // Fires after hydration, and after render passes that commit DOM updates.
              - generic [ref=e1894]: // Those DOM updates may be a full replacement or a partial update.
              - generic [ref=e1895]: // Receives the outer diffs container element.
              - generic [ref=e1896]: // Useful when you want to do your own post-render DOM manipulation.
              - generic [ref=e1897]: // You can access the shadow DOM from here if you need to inspect lines.
              - generic [ref=e1898]: "onPostRender(node: HTMLElement, instance: FileDiffClass) {"
              - generic [ref=e1899]: const codeLines = node.shadowRoot?.querySelectorAll('[data-line]');
              - generic [ref=e1900]: console.log('rendered line count', codeLines?.length ?? 0);
              - generic [ref=e1901]: "},"
              - generic [ref=e1903]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1904]: // LINE SELECTION
              - generic [ref=e1905]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1907]: // Enable click-to-select on line numbers
              - generic [ref=e1908]: "enableLineSelection: false,"
              - generic [ref=e1910]: // Callbacks for selection events
              - generic [ref=e1911]: "onLineSelectionStart(range: SelectedLineRange | null) {"
