              - generic [ref=e1916]: "},"
              - generic [ref=e1917]: "onLineSelectionEnd(range: SelectedLineRange | null) {"
              - generic [ref=e1918]: // Fires on pointer up
              - generic [ref=e1919]: "},"
              - generic [ref=e1920]: "onLineSelected(range: SelectedLineRange | null) {"
              - generic [ref=e1921]: // Fires on pointer up with final range (or null)
              - generic [ref=e1922]: "},"
              - generic [ref=e1924]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1925]: // MOUSE EVENTS
              - generic [ref=e1926]: // ─────────────────────────────────────────────────────────────
              - generic [ref=e1928]: // Line hover effect. Sets a data-hovered attribute on the
              - generic [ref=e1929]: // hovered element(s), which you can style via the Styling API.
              - generic [ref=e1930]: // 'disabled' (default) - no hover effect
              - generic [ref=e1931]: // 'both' - highlights both line number and line content
              - generic [ref=e1932]: // 'number' - highlights only the line number
              - generic [ref=e1933]: // 'line' - highlights only the line content
              - generic [ref=e1934]: "lineHoverHighlight: 'disabled',"
              - generic [ref=e1936]: // Must be true to enable renderGutterUtility prop
              - generic [ref=e1937]: "enableGutterUtility: false,"
              - generic [ref=e1938]: "// Deprecated alias: enableHoverUtility"
              - generic [ref=e1939]: // This boolean controls visibility for both built-in and custom gutter utility UI.
