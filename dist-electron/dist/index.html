<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var k = "instrument-color-scheme";
          var v = localStorage.getItem(k);
          var dark = false;
          if (v === "dark") dark = true;
          else if (v === "light") dark = false;
          else dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
