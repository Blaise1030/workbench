# Opens and updates release PRs from Conventional Commits; merges create a version tag.
# `trigger-release` dispatches `.github/workflows/release.yml` (GITHUB_TOKEN tag pushes do not trigger workflows).
#
# If you see: "GitHub Actions is not permitted to create or approve pull requests":
#   Repo → Settings → Actions → General → Workflow permissions:
#   - "Read and write permissions" AND
#   - Enable "Allow GitHub Actions to create and approve pull requests"
#   https://docs.github.com/actions/how-to/use-workflows-and-actions/configure-workflow-permissions
#
# Pushes made with GITHUB_TOKEN do not trigger other workflows (including tag pushes), so the
# `trigger-release` job dispatches the Release workflow after a workbench release is created.
name: Release Please

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      workbench_release_created: ${{ steps.release.outputs['apps/desktop--release_created'] }}
      workbench_version: ${{ steps.release.outputs['apps/desktop--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Tags and changelog commits are created on this branch after a release PR merges.
          # Uses the GitHub default branch (main or master) so tags always track production.
          target-branch: ${{ github.event.repository.default_branch }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Dispatch Release so installers build (GITHUB_TOKEN tag pushes do not trigger workflows).
  trigger-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.workbench_release_created == 'true' || (needs.release-please.outputs.releases_created == 'true' && needs.release-please.outputs.workbench_version != '') }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch Release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.release-please.outputs.workbench_version }}"
          if [ -z "$VERSION" ]; then
            echo "::error::Missing apps/desktop version from release-please outputs"
            exit 1
          fi
          gh workflow run release.yml --repo "${{ github.repository }}" --ref "v${VERSION}" -f release_as="v${VERSION}"
