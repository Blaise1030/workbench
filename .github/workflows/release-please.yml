# Opens and updates release PRs from Conventional Commits; merges create a version tag.
# The tag triggers `.github/workflows/release.yml`, which builds installers and publishes the GitHub Release.
#
# If you see: "GitHub Actions is not permitted to create or approve pull requests":
#   Repo → Settings → Actions → General → Workflow permissions:
#   - "Read and write permissions" AND
#   - Enable "Allow GitHub Actions to create and approve pull requests"
#   https://docs.github.com/actions/how-to/use-workflows-and-actions/configure-workflow-permissions
#
# Or add repo secret RELEASE_PLEASE_TOKEN (fine-grained PAT: Contents + Pull requests + Issues read/write
# on this repo; or classic PAT with `repo` scope) and this workflow will use it instead of GITHUB_TOKEN.
name: Release Please

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          # Tags and changelog commits are created on this branch after a release PR merges.
          # Uses the GitHub default branch (main or master) so tags always track production.
          target-branch: ${{ github.event.repository.default_branch }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
