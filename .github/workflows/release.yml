# Build desktop installers when you push a version tag (e.g. v0.2.2).
# Tags and GitHub Releases are created by `.github/workflows/release-please.yml` when a release PR merges.
# Tag must match apps/desktop/package.json "version" (after stripping the leading v).
# Uploads per-OS artifacts to the existing GitHub Release for that tag.
# Also uploads latest.json so the landing page can use a stable URL:
#   https://github.com/<owner>/<repo>/releases/latest/download/latest.json
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
            electron_builder_args: --mac
            artifact_glob: apps/desktop/release/*.dmg
          - os: windows-latest
            target: win
            electron_builder_args: --win
            artifact_glob: apps/desktop/release/*.exe
          - os: ubuntu-latest
            target: linux
            electron_builder_args: --linux
            artifact_glob: apps/desktop/release/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches workbench version
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Git tag $GITHUB_REF_NAME must match apps/desktop/package.json version (expected v${PKG_VERSION})"
            exit 1
          fi

      - name: Linux native build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential python3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer + main process
        run: pnpm run build:app

      - name: Package (${{ matrix.target }})
        run: pnpm --filter workbench exec electron-builder ${{ matrix.electron_builder_args }} --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.target }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: installers-*
          merge-multiple: true

      - name: Upload installers to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          mapfile -t files < <(find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' \) | sort -u)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No installer artifacts found under artifacts/"
            exit 1
          fi
          RELEASE_READY=0
          for _ in $(seq 1 30); do
            if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
              RELEASE_READY=1
              break
            fi
            sleep 2
          done
          if [ "$RELEASE_READY" -ne 1 ]; then
            echo "::notice::No GitHub Release for $TAG after waiting; creating (manual tag path)."
            if [[ "$TAG" == *-* ]]; then
              gh release create "$TAG" --repo "${{ github.repository }}" --title "$TAG" --generate-notes --prerelease
            else
              gh release create "$TAG" --repo "${{ github.repository }}" --title "$TAG" --generate-notes
            fi
          fi
          gh release upload "$TAG" "${files[@]}" --clobber --repo "${{ github.repository }}"

      - name: Publish latest.json (stable URL for landing page)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          mapfile -t files < <(find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' \) | sort -u)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No installers found for latest.json"
            exit 1
          fi
          RELEASED_AT="$(gh release view "$TAG" --repo "$REPO" --json publishedAt -q .publishedAt)"
          PRERELEASE="$(gh release view "$TAG" --repo "$REPO" --json isPrerelease -q .isPrerelease)"
          python3 - "$TAG" "$REPO" "$RELEASED_AT" "$PRERELEASE" "${files[@]}" <<'PY'
          import json, os, sys
          from urllib.parse import quote

          tag = sys.argv[1]
          repo = sys.argv[2]
          released_at = sys.argv[3]
          prerelease = sys.argv[4].lower() == "true"
          paths = sys.argv[5:]

          version = tag[1:] if tag.startswith("v") else tag
          owner, name = repo.split("/", 1)
          base = f"https://github.com/{repo}/releases/download/{tag}"

          def classify(name):
              lower = name.lower()
              if lower.endswith(".dmg"):
                  return "mac"
              if lower.endswith(".exe"):
                  return "windows"
              if lower.endswith(".appimage"):
                  return "linux"
              return None

          downloads = {}
          for p in paths:
              fn = os.path.basename(p)
              key = classify(fn)
              if not key:
                  continue
              downloads[key] = {
                  "filename": fn,
                  "url": f"{base}/{quote(fn)}",
              }

          out = {
              "version": version,
              "tag": tag,
              "repository": repo,
              "released_at": released_at,
              "prerelease": prerelease,
              "latest": {
                  "json": f"https://github.com/{repo}/releases/latest/download/latest.json",
                  "release": f"https://github.com/{repo}/releases/latest",
                  "github_api": f"https://api.github.com/repos/{owner}/{name}/releases/latest",
              },
              "downloads": downloads,
          }

          with open("latest.json", "w", encoding="utf-8") as f:
              json.dump(out, f, indent=2)
              f.write("\n")
          PY
          gh release upload "$TAG" latest.json --clobber --repo "$REPO"
