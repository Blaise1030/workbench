name: Deploy Landing Page

on:
  push:
    branches: [main]
    paths:
      - "apps/landing-page/**"
      - ".github/workflows/deploy-landing-page.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
  workflow_dispatch:

concurrency:
  group: deploy-landing-page-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: apps/landing-page
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install landing page dependencies
        run: pnpm install --frozen-lockfile --filter apps-landing-page...

      - name: Build landing page
        run: pnpm --filter apps-landing-page build

      - name: Deploy to Cloudflare
        run: pnpm --filter apps-landing-page exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
