# https://www.electron.build/configuration
appId: com.workbench.desktop
productName: workbench
copyright: Copyright © workbench contributors
# Must match devDependency `electron` in package.json — native modules (better-sqlite3, node-pty)
# are rebuilt in postinstall via `electron-builder install-app-deps` using this version.
electronVersion: 39.8.5

directories:
  output: release
  # App icons: build/icon.icns, build/icon.ico, build/icon.png (from build/icon-source.png).
  # Optional: remove dark studio floor from source PNG (transparent edges but opaque mat under subject):
  #   python3 build/remove_icon_dark_floor.py build/icon-source.png -o build/icon-source.png
  # Regenerate: npx electron-icon-builder --input=build/icon-source.png --output=build --flatten
  # then: cp build/icons/icon.icns build/ && cp build/icons/icon.ico build/ && cp build/icons/512x512.png build/icon.png && rm -rf build/icons
  buildResources: build

files:
  - dist-electron/**/*
  - electron/storage/schema.sql
  - package.json
  - "!dist-electron/**/*.map"

asarUnpack:
  - "**/*.node"

publish:
  provider: github
  releaseType: release
  publishAutoUpdate: true
  channel: latest

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    - nsis

linux:
  target:
    - AppImage
  category: Development
